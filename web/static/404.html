<div style="
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f7fa;   /* ✅ MATCH SITE BACKGROUND */
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #00ffff;
">

    <div style="
        max-width: 720px;
        width: 90%;
        padding: 40px;
        border: 2px solid #00ffff;
        border-radius: 14px;
        background: linear-gradient(145deg, #071a1f, #0b2b31);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.35);
        text-align: center;
    ">

        <!-- PRODUCT UNAVAILABLE -->
        <div style="
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #00ffff;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        ">
            PRODUCT UNAVAILABLE
        </div>

        <!-- 404 -->
        <div style="
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.9);
        ">
            404
        </div>

        <!-- TITLE -->
        <h1 style="margin: 10px 0; font-size: 32px; color: #ffffff;">
            Product Not Found
        </h1>

        <!-- TEXT -->
        <p style="
            font-size: 16px;
            line-height: 1.6;
            color: #b8ffff;
            margin: 20px 0 30px 0;
        ">
            The requested product could not be located in the current catalogue.
            It may have been removed, renamed, or is temporarily unavailable.
        </p>

        <!-- INFO BOX -->
        <div style="
            margin: 25px auto;
            padding: 18px;
            border: 1px dashed #00ffff;
            border-radius: 10px;
            color: #88ffff;
            background: rgba(0, 255, 255, 0.06);
            font-size: 15px;
            text-align: left;
        ">
            <div><b>Requested SKU:</b> {{ data.product.sku || 'HPTD' }}</div>
            <div><b>Status:</b> 404 Not Found</div>
            <div><b>Suggested Action:</b> Browse related products</div>
        </div>

        <!-- BUTTONS -->
        <div style="margin-top: 25px;">

            <button ng-click="goHome()" style="
                padding: 10px 18px;
                margin-right: 10px;
                background: #00ffff;
                color: #001316;
                font-weight: 700;
                border-radius: 8px;
                border: none;
                cursor: pointer;
                box-shadow: 0 0 18px rgba(0, 255, 255, 0.45);
            ">
                Back to Shop
            </button>

            <button ng-click="goHome()" style="
                padding: 10px 18px;
                background: transparent;
                color: #00ffff;
                border: 1px solid #00ffff;
                border-radius: 8px;
                cursor: pointer;
            ">
                Browse Products
            </button>

        </div>

    </div>
</div>
